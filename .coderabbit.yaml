language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "develop"
      - "staging"
      - "feature/.*"
      - "fix/.*"
      - "chore/.*"
      - "hotfix/.*"
  auto_approve: false
chat:
  auto_reply: true
